<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Brick Game</title>
<style>
body {
  margin: 0;
  background: #111;
  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}
canvas {
  border: 2px solid white;
  background: black;
}
</style>
</head>
<body>

<canvas id="game" width="520" height="380"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const imageFiles = [
"ameba1.png","ameba2.jpg","astro1.png","bear1.png",
"dol1-1.jpg","dol1-2.jpg","dol2.jpg","dol3.png",
"dolbag1.png","dolbagi.png","face1.jpg","fish1.png",
"hat1.jpg","helmet1.jpg","helmet2.png","human.png",
"human1.jpg","lumimi1.png","space1.png"
];

// 🔥 이미지 로딩 완료 후 시작
let loaded = 0;
let images = [];

imageFiles.forEach((src, i) => {
  let img = new Image();
  img.src = "./img/" + src;

  img.onload = () => {
    loaded++;
    if (loaded === imageFiles.length) startGame();
  };

  img.onerror = () => {
    console.error("이미지 못찾음:", src);
  };

  images.push(img);
});

function startGame() {

  let bricks = images.map((img, i) => ({
    x: (i % 5) * 100 + 20,
    y: Math.floor(i / 5) * 90 + 30,
    w: 80,
    h: 70,
    hp: (i % 3) + 1,
    img: img
  }));

  let x = 260, y = 300, dx = 3, dy = -3;
  let paddleX = 200;

  let rightPressed = false;
  let leftPressed = false;

  document.addEventListener("keydown", e => {
    if (e.key === "ArrowRight") rightPressed = true;
    if (e.key === "ArrowLeft") leftPressed = true;
  });

  document.addEventListener("keyup", e => {
    if (e.key === "ArrowRight") rightPressed = false;
    if (e.key === "ArrowLeft") leftPressed = false;
  });

  function collision() {
    bricks.forEach(b => {
      if (b.hp > 0) {
        if (x > b.x && x < b.x + b.w && y > b.y && y < b.y + b.h) {
          dy = -dy;
          b.hp--;
        }
      }
    });
  }

  function draw() {
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    bricks.forEach(b => {
      if (b.hp > 0) {
        ctx.drawImage(b.img, b.x, b.y, b.w, b.h);
      }
    });

    ctx.beginPath();
    ctx.arc(x, y, 8, 0, Math.PI * 2);
    ctx.fillStyle = "white";
    ctx.fill();

    ctx.fillRect(paddleX, 360, 100, 10);

    collision();

    x += dx;
    y += dy;

    if (x < 0 || x > canvas.width) dx *= -1;
    if (y < 0) dy *= -1;

    if (y > canvas.height) {
      alert("Game Over");
      location.reload();
    }

    if (y > 350 && x > paddleX && x < paddleX + 100) {
      dy *= -1;
    }

    if (rightPressed) paddleX += 6;
    if (leftPressed) paddleX -= 6;

    requestAnimationFrame(draw);
  }

  draw();
}
</script>

</body>
</html>
