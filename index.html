<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Image Brick Breaker</title>
<style>
  body {
    margin: 0;
    background: #111;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }
  canvas {
    border: 2px solid white;
    background: black;
  }
</style>
</head>
<body>

<canvas id="game" width="520" height="380"></canvas>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

// 이미지 리스트
const imageFiles = [
  "ameba1.png","ameba2.jpg","astro1.png","bear1.png",
  "dol1-1.jpg","dol1-2.jpg","dol2.jpg","dol3.png",
  "dolbag1.png","dolbagi.png","face1.jpg","fish1.png",
  "hat1.jpg","helmet1.jpg","helmet2.png","human.png",
  "human1.jpg","lumimi1.png","space1.png"
];

// 이미지 객체
let bricks = [];

imageFiles.forEach((src, i) => {
  let img = new Image();
  img.src = "img/" + src;

  bricks.push({
    x: (i % 5) * 100 + 20,
    y: Math.floor(i / 5) * 90 + 30,
    width: 80,
    height: 70,
    hp: (i % 3) + 1, // ⭐ 개성 핵심 (1~3)
    shake: 0,
    img: img
  });
});

// 공
let x = 260;
let y = 300;
let dx = 3;
let dy = -3;
const ballRadius = 8;

// 패들
const paddleWidth = 100;
const paddleHeight = 10;
let paddleX = 200;

// 키
let rightPressed = false;
let leftPressed = false;

document.addEventListener("keydown", e => {
  if (e.key === "ArrowRight") rightPressed = true;
  if (e.key === "ArrowLeft") leftPressed = true;
});

document.addEventListener("keyup", e => {
  if (e.key === "ArrowRight") rightPressed = false;
  if (e.key === "ArrowLeft") leftPressed = false;
});

// 충돌
function collision() {
  bricks.forEach(b => {
    if (b.hp > 0) {
      if (
        x > b.x &&
        x < b.x + b.width &&
        y > b.y &&
        y < b.y + b.height
      ) {
        dy = -dy;

        b.hp--;
        b.shake = 10; // 흔들림 효과

        if (b.hp <= 0) {
          dx *= 1.02; // 공 속도 증가 (개성 강화)
        }
      }
    }
  });
}

// 공
function drawBall() {
  ctx.beginPath();
  ctx.arc(x, y, ballRadius, 0, Math.PI * 2);
  ctx.fillStyle = "#fff";
  ctx.fill();
}

// 패들
function drawPaddle() {
  ctx.fillStyle = "#fff";
  ctx.fillRect(paddleX, canvas.height - paddleHeight, paddleWidth, paddleHeight);
}

// 벽돌 (개성 적용)
function drawBricks() {
  bricks.forEach(b => {
    if (b.hp > 0) {
      let shakeX = 0;
      let shakeY = 0;

      if (b.shake > 0) {
        shakeX = (Math.random() - 0.5) * 6;
        shakeY = (Math.random() - 0.5) * 6;
        b.shake--;
      }

      ctx.drawImage(
        b.img,
        b.x + shakeX,
        b.y + shakeY,
        b.width,
        b.height
      );

      // HP 표시 (개성 표현)
      ctx.fillStyle = "white";
      ctx.font = "12px Arial";
      ctx.fillText("HP:" + b.hp, b.x + 5, b.y + 15);
    }
  });
}

// 게임 루프
function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);

  drawBricks();
  drawBall();
  drawPaddle();
  collision();

  x += dx;
  y += dy;

  // 벽
  if (x + dx > canvas.width - ballRadius || x + dx < ballRadius) dx = -dx;
  if (y + dy < ballRadius) dy = -dy;

  // 패들 충돌
  else if (y + dy > canvas.height - ballRadius) {
    if (x > paddleX && x < paddleX + paddleWidth) {
      dy = -dy;
    } else {
      alert("Game Over");
      location.reload();
    }
  }

  // 패들 이동
  if (rightPressed && paddleX < canvas.width - paddleWidth) paddleX += 7;
  if (leftPressed && paddleX > 0) paddleX -= 7;

  requestAnimationFrame(draw);
}

draw();
</script>

</body>
</html>
